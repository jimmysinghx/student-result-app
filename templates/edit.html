<!DOCTYPE html>
<html>
    <head>
        <title>JINJA</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='jinjacss.css') }}">

    </head>
    <body>
    
        <form action="" method="POST" id="editForm">
            Name :    <input type="text" name="name" placeholder="Enter your nmae" value="{{ student[1] }}" required>
            Reg. No : <input type="text" name="reg"  placeholder="Enter your registration number" value="{{ student[2] }} " readonly required>
            <p>Subjects</p>
            English   : <input type="number" name="english" placeholder="Marks" min="0" max="100" step = "0.1" value="{{ student[3] }}"required>
            Hindi     : <input type="number" name="hindi" placeholder="Marks" min="0" max="100" step = "0.1" value="{{ student[4] }}"" required>
            Physics   : <input type="number" name="physics" placeholder="Marks" min="0" max="100" step = "0.1" value ="{{ student[5] }}" required>
            Chemistry : <input type="number" name="chemistry" placeholder="Marks" min="0" max="100" step = "0.1" value="{{ student[6]  }}"required>
            Biology   : <input type="number" name="biology" placeholder="Marks" min="0" max="100" step = "0.1" value="{{ student[7] }}" required>
            <button type="button" onclick="submitForm()">UPDATE</button>

        </form>
        <script>
            function submitForm(){
                const form = document.getElementById("editForm");
                const id = "{{ student[0] }}";
                form.action =`update/${id}`
                form.submit()
            }

        </script>
        


        </ul>
   
    </body>
</html>
